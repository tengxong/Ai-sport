<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ຂໍ້ຄວາມຈາກລູກຄ້າ - Ai Sport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nav-item.active { color: #ffffff; border-bottom: 2px solid #ffffff; }
    .nav-item { color: rgba(255, 255, 255, 0.7); }
    .nav-item:hover { color: #ffffff; }
    .sidebar-item.active { background: rgba(255,0,153,0.08); color: #ff0099; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  {% include 'partials/admin_navbar.html' %}

  <div class="flex min-h-[calc(100vh-4rem)]">
    {% set active_page = 'contact_messages' %}
    {% include 'partials/admin_sidebar.html' %}

    <main class="flex-1 min-w-0 p-6 md:p-8 w-full">
      <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">ຂໍ້ຄວາມຈາກລູກຄ້າ</h1>
        <p class="text-gray-600">ຂໍ້ຄວາມທີ່ລູກຄ້າສົ່ງຜ່ານຟອມຕິດຕໍ່</p>
      </div>

      <div class="bg-white rounded-lg shadow">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ຊື່ຜູ້ຕິດຕໍ່</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ເບີໂທ</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ຂໍ້ຄວາມ</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ວັນທີ</th>
              </tr>
            </thead>
            <tbody id="contact-messages-tbody" class="bg-white divide-y divide-gray-200">
              <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">ກຳລັງໂຫຼດ...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="p-4 border-t text-sm text-gray-600">
          ສະແດງ <span id="msg-total">0</span> ຂໍ້ຄວາມ
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/notification.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!API.getToken()) {
        window.location.href = '/login?next=' + encodeURIComponent('/contact-messages');
        return;
      }

      const tbody = document.getElementById('contact-messages-tbody');
      const totalEl = document.getElementById('msg-total');

      try {
        await API.get('/api/admin/me');
        const list = await API.get('/api/admin/contact-messages');

        if (!list || list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">ຍັງບໍ່ມີຂໍ້ຄວາມ</td></tr>';
          if (totalEl) totalEl.textContent = '0';
          return;
        }

        tbody.innerHTML = list.map((msg, idx) => {
          const date = msg.created_at ? new Date(msg.created_at).toLocaleString('th-LA', { dateStyle: 'short', timeStyle: 'short' }) : '-';
          const messageText = (msg.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
          return `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${msg.id}</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-medium text-gray-900">${(msg.name || '').replace(/</g, '&lt;')}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <a href="https://wa.me/${(msg.phone || '').replace(/\D/g, '').replace(/^0/, '856')}" target="_blank" rel="noopener" class="text-sm text-green-600 hover:underline">${(msg.phone || '').replace(/</g, '&lt;')}</a>
              </td>
              <td class="px-6 py-4">
                <div class="text-sm text-gray-900 max-w-md whitespace-pre-wrap">${messageText}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${date}</td>
            </tr>
          `;
        }).join('');

        if (totalEl) totalEl.textContent = list.length;
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">' + (error.message || 'ໂຫຼດບໍ່ສຳເລັດ') + '</td></tr>';
        if (totalEl) totalEl.textContent = '0';
        if (error.message && error.message.includes('token')) {
          setTimeout(() => { window.location.href = '/login?next=' + encodeURIComponent('/contact-messages'); }, 1500);
        }
      }
    });
  </script>
</body>
</html>
