<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ຂໍ້ຄວາມລູກຄ້າ - Ai Sport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nav-item.active { color: #ffffff; border-bottom: 2px solid #ffffff; }
    .sidebar-item.active { background: rgba(255,0,153,0.08); color: #ff0099; font-weight: 600; }
    .message-card { white-space: pre-wrap; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  {% include 'partials/admin_navbar.html' %}

  <div class="flex min-h-[calc(100vh-4rem)]">
    {% set active_page = 'contact_messages' %}
    {% include 'partials/admin_sidebar.html' %}

    <main class="flex-1 min-w-0 p-6 md:p-8 w-full">
      <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900 mb-2">ຂໍ້ຄວາມລູກຄ້າ</h1>
          <p class="text-gray-600">ຂໍ້ຄວາມທີ່ລູກຄ້າສົ່ງມາຜ່ານຟອມຕິດຕໍ່</p>
        </div>
      </div>

      <!-- โลโก้ + อัปโหลด (รองรับ SVG แรงดี) -->
      <div class="bg-white rounded-xl shadow p-6 mb-8 flex flex-wrap items-center gap-6">
        <div class="flex items-center gap-4">
          <img id="site-logo-img" src="/static/uploads/site_logo.svg" alt="Logo" class="h-14 w-auto object-contain" onerror="this.style.display='none'; document.getElementById('site-logo-fallback').style.display='block';">
          <img id="site-logo-fallback" src="/static/uploads/site_logo.png" alt="Logo" class="h-14 w-auto object-contain hidden" onerror="this.onerror=null; this.style.display='none'; document.getElementById('site-logo-placeholder').style.display='flex';">
          <div id="site-logo-placeholder" class="h-14 w-24 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400 text-sm hidden">ບໍ່ມີໂລໂກ້</div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ອັບໂຫຼດໂລໂກ້ (SVG / PNG / JPG)</label>
          <div class="flex items-center gap-2">
            <input type="file" id="logo-upload-input" accept=".svg,.png,.jpg,.jpeg" class="text-sm">
            <button type="button" onclick="uploadLogo()" class="px-4 py-2 bg-[#ff0099] text-white rounded-lg hover:bg-[#e60088] text-sm">ອັບໂຫຼດ</button>
          </div>
          <p class="text-xs text-gray-500 mt-1">ແນະນຳ: ໃຊ້ SVG ເພື່ອຄຸນນະພາບແບບ vector</p>
        </div>
      </div>

      <!-- รายการข้อความ -->
      <div id="messages-list" class="space-y-4">
        <p class="text-gray-500">ກຳລັງໂຫຼດ...</p>
      </div>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/notification.js"></script>
  <script>
    function refreshLogo() {
      const img = document.getElementById('site-logo-img');
      const fallback = document.getElementById('site-logo-fallback');
      const placeholder = document.getElementById('site-logo-placeholder');
      if (img) { img.src = '/static/uploads/site_logo.svg?t=' + Date.now(); img.style.display = ''; img.onerror = function() { img.style.display='none'; if(fallback) { fallback.style.display='block'; fallback.src='/static/uploads/site_logo.png?t='+Date.now(); fallback.onerror=function(){ fallback.style.display='none'; if(placeholder) placeholder.style.display='flex'; }; } }; }
      if (fallback) fallback.style.display = 'none';
      if (placeholder) placeholder.style.display = 'none';
    }

    async function uploadLogo() {
      const input = document.getElementById('logo-upload-input');
      if (!input || !input.files || !input.files[0]) {
        Notification.warning('ກະລຸນາເລືອກຕົວະ');
        return;
      }
      const form = new FormData();
      form.append('file', input.files[0]);
      try {
        const token = API.getToken();
        const r = await fetch('/api/admin/upload-logo', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: form });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'ອັບໂຫຼດບໍ່ສຳເລັດ');
        Notification.success('ອັບໂຫຼດໂລໂກ້ສຳເລັດ');
        input.value = '';
        refreshLogo();
      } catch (e) {
        Notification.error(e.message);
      }
    }

    async function loadMessages() {
      const listEl = document.getElementById('messages-list');
      try {
        const token = API.getToken();
        const r = await fetch('/api/admin/contact-submissions', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok) throw new Error('โหลดບໍ່ໄດ້');
        const rows = await r.json();
        if (rows.length === 0) {
          listEl.innerHTML = '<p class="text-gray-500 py-8">ຍັງບໍ່ມີຂໍ້ຄວາມຈາກລູກຄ້າ</p>';
          return;
        }
        listEl.innerHTML = rows.map(function(item) {
          const created = item.created_at ? new Date(item.created_at).toLocaleString('th-LA') : '-';
          let imagesHtml = '';
          if (item.images) {
            try {
              const arr = typeof item.images === 'string' ? JSON.parse(item.images) : item.images;
              if (Array.isArray(arr) && arr.length) {
                imagesHtml = '<div class="mt-2 flex flex-wrap gap-2">' + arr.map(function(path) {
                  const src = path.indexOf('/') === 0 ? path : '/static/uploads/' + path;
                  return '<a href="' + src + '" target="_blank" class="block"><img src="' + src + '" alt="" class="h-20 w-20 object-cover rounded border" onerror="this.parentElement.remove()"></a>';
                }).join('') + '</div>';
              }
            } catch (e) {}
          }
          return '<div class="bg-white rounded-xl shadow p-5 border-l-4 border-[#ff0099]">' +
            '<div class="flex justify-between items-start gap-4 flex-wrap">' +
              '<div class="flex-1 min-w-0">' +
                '<div class="font-semibold text-gray-900">' + (item.name || '-').replace(/</g,'&lt;') + '</div>' +
                '<div class="text-sm text-gray-500 mt-0.5">ເບີ: ' + (item.phone || '-') + ' · ' + created + '</div>' +
                '<div class="mt-3 p-3 bg-gray-50 rounded-lg message-card text-gray-800">' + (item.message || '').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>' +
                imagesHtml +
              '</div>' +
            '</div></div>';
        }).join('');
      } catch (e) {
        listEl.innerHTML = '<p class="text-red-500">' + e.message + '</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (!API.getToken()) {
        window.location.href = '/login?next=' + encodeURIComponent('/contact-messages');
        return;
      }
      refreshLogo();
      loadMessages();
    });
  </script>
</body>
</html>
